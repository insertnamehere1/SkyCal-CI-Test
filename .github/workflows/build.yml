#          $src = @(
#            "out\clickonce\Publish.htm",
#            "out\clickonce\Publish.html"
#          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
#          if (-not $src) { throw "Publish.htm not found in out\clickonce\" }
#          Copy-Item $src "published/Publish.htm" -Force
            

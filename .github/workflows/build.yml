name: Build, Test, and Release (ClickOnce)

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']   # releases are tag-driven
  pull_request:
    branches: [ master ]
    
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write
  security-events: write

jobs:
  build_test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/packages.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore packages
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build Release
        run: >
          msbuild "Bahtinov Collimator.sln"
          /t:Rebuild
          /p:Configuration=Release
          /p:Deterministic=true
          /p:TreatWarningsAsErrors=true
          
      # Publish ClickOnce
      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\SkyCal-setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\SkyCal-clickonce.zip" -Force
          "@@ Build: $env:GITHUB_RUN_ID`nRef: $env:GITHUB_REF`nSHA: $env:GITHUB_SHA" | Out-File artifacts\BUILD-METADATA.txt -Encoding UTF8

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts/




  codeql:
    name: CodeQL (C# .NET Framework)
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build solution for analysis
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3



          

  release:
    name: Release (tag only)
    needs: [build_test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Checksums
        shell: pwsh
        run: |
          cd dist
          Get-ChildItem * | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath SHA256SUMS.txt -Append -Encoding ascii
          }

      - name: SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SkyCal ${{ github.ref_name }}
          body: |
            Source: ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
            Commit: ${{ github.sha }}
          files: |
            dist/BUILD-METADATA.txt
            dist/SkyCal-clickonce.zip
            dist/SkyCal-setup.exe
            dist/SHA256SUMS.txt
            dist/sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/SkyCal-clickonce.zip
            dist/SkyCal-setup.exe
            
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # needed to push back

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Update published/ from clickonce.zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # PowerShell 7+, propagates native tool errors
          unzip -o dist/SkyCal-clickonce.zip -d published
          # Ensure Pages serves 'Application Files' folder correctly
          touch .nojekyll

      - name: Commit and push changes to master
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # add [skip ci] to avoid retriggering the workflow on this bot commit
          git commit -m "Update ClickOnce feed in /published [skip ci]" -q || powershell -c "Write-Host 'No changes to commit'; exit 0"
          git push origin master


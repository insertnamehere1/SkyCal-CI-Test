name: Build, Release, and Pages Deploy (ClickOnce .NET Framework 4.8.1)

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']     # push a tag like v3.1.3 to trigger a Release
  workflow_dispatch:

# Required for Pages + artifacts + releases
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build & Publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build (Release)
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      # Publish the actual project that has ClickOnce enabled.
      # Adjust the csproj path and the profile file name if different.
      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"

      # Verify where files landed
      - name: Inspect ClickOnce output
        shell: pwsh
        run: |
          if (-not (Test-Path "out\clickonce")) { throw "PublishDir out\clickonce not found" }
          Get-ChildItem -Recurse "out\clickonce" | Select-Object FullName, Length | Format-Table -AutoSize

      # Stage artifacts for downstream jobs
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  release:
    name: Create GitHub Release (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/setup.exe
          generate_release_notes: true

pages-deploy:
  needs: build
  runs-on: ubuntu-latest
  permissions:
    pages: write
    id-token: write
  environment:
    name: github-pages
    url: ${{ steps.deployment.outputs.page_url }}
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: artifacts

    - name: Stage to /published
      run: |
        set -e
        rm -rf public
        mkdir -p public/published
        unzip -o artifacts/clickonce.zip -d public/published
        # Ensure Pages serves "Application Files" properly
        touch public/.nojekyll

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

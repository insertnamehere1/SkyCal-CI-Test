name: Build & Publish ClickOnce on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_and_publish:
    runs-on: windows-latest
    steps:
      - name: Checkout source at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build (Release)
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"

      - name: Package ClickOnce output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force

      - name: Checkout master into subfolder
        uses: actions/checkout@v4
        with:
          ref: master
          path: repo-master
          fetch-depth: 0

      - name: Update repo-master/published from clickonce.zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "repo-master\published" | Out-Null
          Expand-Archive -Path "artifacts\clickonce.zip" -DestinationPath "repo-master\published" -Force
          New-Item -ItemType File -Path "repo-master\.nojekyll" -Force | Out-Null

      - name: Commit and push to master
        shell: pwsh
        run: |
          Set-Location repo-master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ClickOnce feed in /published from release ${{ github.event.release.tag_name }} [skip ci]" || echo "No changes to commit"
          git push origin master

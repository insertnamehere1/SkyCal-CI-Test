#          $ErrorActionPreference = 'Stop'
#          $PSNativeCommandUseErrorActionPreference = $true   # PowerShell 7+, propagates native tool errors
#          unzip -o artifacts/clickonce.zip -d published
#          # Ensure Pages serves 'Application Files' folder correctly
#          touch .nojekyll
 
      - name: Commit and push changes to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ClickOnce feed in /published [skip ci]" || echo "No changes to commit"
          git push origin master

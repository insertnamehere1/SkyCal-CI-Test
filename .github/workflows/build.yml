name: Build and Release (Windows .NET)

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: NuGet/setup-nuget@v2

      - uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build Release
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="ClickOnceProfile.pubxml"
          # If the profile is under Properties\PublishProfiles, you can pass the full relative path:
          # /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          # Adjust path if your TFM differs
          $pub = Get-ChildItem -Recurse -Directory -Filter app.publish | Select-Object -First 1 -Expand FullName
          if (-not $pub) { throw "app.publish folder not found" }
          if (Test-Path "$pub\setup.exe") { Copy-Item "$pub\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "$pub\*" -DestinationPath "artifacts\clickonce.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  # example: release and pages jobs go here; do NOT run msbuild in them
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/setup.exe
          generate_release_notes: true

  pages-deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - name: Prepare site
        run: |
          rm -rf public
          mkdir -p public/published
          unzip -q artifacts/clickonce.zip -d public/published
          touch public/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4

name: Build and Release (Windows .NET Framework)

on:
  push:
    branches: [ master ]
    tags:
      - 'v3.1.0'   # pushing a tag like v1.2.3 will produce a release
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: nuget restore "Bahtinov Collimator.sln"

      # If you have .NET Core test projects too, set up a SDK:
      # - name: Set up .NET SDK
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'

      - name: Build Release
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      # If you have MSTest or NUnit for .NET Framework, use VSTest:
      # - name: Discover and run tests with VSTest
      #   run: |
      #    "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" ^
      #    "$(Get-ChildItem -Recurse -Filter *Tests.dll | Select -Expand FullName)" || exit 0

      # If you use ClickOnce, you can publish like this:
      - name: ClickOnce Publish
        run: msbuild YourProject.csproj /t:Publish ^
             /p:Configuration=Release /p:PublishProfile=YourClickOnceProfile.pubxml

      # If you use WiX or Inno Setup, add those build steps here
      # and place the generated MSI/EXE into a known output folder.

      - name: Collect Artifacts
        run: |
          mkdir artifacts
          copy /y Path\To\Your\Built\App\bin\Release\* artifacts\

      - name: Upload CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  codeql:
    # runs CodeQL on every push and PR for analysis
    permissions:
      security-events: write
      contents: read
      actions: read
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  release:
    # only runs when you push a version tag like v1.2.3
    needs: [build-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

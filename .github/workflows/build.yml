name: Build and Release (Windows .NET Framework)

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build Release
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      # ClickOnce publish (adjust paths to match your repo)
      - name: ClickOnce Publish
        run: msbuild "SkyCal.csproj" /t:Publish /p:Configuration=Release /p:PublishProfile="FolderProfile.pubxml"

      # Collect publish output (ClickOnce)
      - name: Collect Artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "bin\Release\app.publish\*" -Destination "artifacts" -Recurse -Force

      - name: Upload CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  codeql:
    name: CodeQL (C#)
    runs-on: windows-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: Restore NuGet packages
        run: nuget restore "Bahtinov Collimator.sln"
      - name: Build for analysis
        run: msbuild "SkyCal.csproj" /t:Rebuild /p:Configuration=Release /m
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  release:
    needs: [build-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

name: ClickOnce Build and Deploy

on:
  push:
    tags:
      - "v*"         # run on version tags like v1.2.3
  workflow_dispatch:  # allow manual runs

jobs:
  build:
    runs-on: windows-latest

    env:
      SOLUTION_PATH: "Bahtinov Collimator.sln"            # set this
      PROJECT_PATH: SkyCal.csproj   # set this
      PUBLISH_ROOT: artifacts/clickonce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore $env:SOLUTION_PATH

      # Optional: if you sign ClickOnce manifests, import the PFX
      # - name: Import code signing cert
      #   if: ${{ secrets.CLICKONCE_PFX && secrets.CLICKONCE_PFX_PASSWORD }}
      #   shell: pwsh
      #   run: |
      #     $pfx = "${{ runner.temp }}\signing.pfx"
      #     [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String("${{ secrets.CLICKONCE_PFX }}"))
      #     certutil -f -p "${{ secrets.CLICKONCE_PFX_PASSWORD }}" -importpfx $pfx NoRoot

      - name: Build (Release)
        run: msbuild $env:SOLUTION_PATH /t:Build /p:Configuration=Release /m

      - name: Publish ClickOnce
        run: >
          msbuild $env:PROJECT_PATH /t:Publish /p:Configuration=Release
          /p:PublishProtocol=ClickOnce
          /p:PublishDir="$env:PUBLISH_ROOT\"
          /p:PublishUrl="$env:PUBLISH_ROOT\"
          /p:InstallUrl="$env:INSTALL_URL"
          /p:IsWebBootstrapper=true

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:PUBLISH_ROOT\*" -DestinationPath "$env:RUNNER_TEMP\clickonce.zip"
        # Upload the artifact so a later job can deploy it
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickonce
          path: ${{ runner.temp }}\clickonce.zip

  # ===== OPTION B: Commit to master:/published =====
  deploy_master_published:
    needs: build
    runs-on: windows-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: clickonce
          path: ${{ runner.temp }}

      - name: Ensure published folder exists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path published | Out-Null

      - name: Unzip artifact into published/ (overwrite)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path published | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\clickonce.zip" -DestinationPath "published" -Force -ErrorAction Stop

      - name: Commit and push
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add published
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
          } else {
            $msg = "Deploy ClickOnce: ${{ github.run_number }} on $((Get-Date).ToString('u'))"
            git commit -m "$msg"
            git push origin master
          }

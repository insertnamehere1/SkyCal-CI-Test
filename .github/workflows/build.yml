name: Build & Publish ClickOnce to master/published

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']     # optional: create releases on tags if you keep a release job
  workflow_dispatch:

permissions:
  contents: write   # needed to commit to master

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build (Release)
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      # Publish the project that has ClickOnce enabled
  release:  
    needs: build
    runs-on: windows-latest
    name: ClickOnce build
    steps:
      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  publish:
    needs: release
    runs-on: ubuntu-latest
    name: Publish
    steps:
      - name: Checkout master (target branch)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Update published/ from clickonce.zip
        run: |
          set -e
          rm -rf published
          mkdir -p published
          unzip -q artifacts/clickonce.zip -d published
          # Optional: add a simple index page
          echo "<h1>SkyCal Downloads</h1><p>ClickOnce manifests live in /published</p>" > published/index.html
          # Ensure Pages serves 'Application Files' folder correctly
          touch .nojekyll
      - name: Commit and push changes to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ClickOnce feed in /published [skip ci]" || echo "No changes to commit"
          git push origin master

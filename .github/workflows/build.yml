name: Build and Release (Windows .NET)

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: NuGet/setup-nuget@v2

      - uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build Release
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      # IMPORTANT: publish the actual project that has ClickOnce enabled
      - name: ClickOnce Publish (.NET Framework 4.8.1)
        shell: pwsh
        run: >
          msbuild "SkyCal\SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"

      # Prove the output exists and show what was produced
      - name: Inspect ClickOnce output
        shell: pwsh
        run: |
          if (-not (Test-Path "out\clickonce")) { throw "PublishDir out\clickonce not found" }
          Get-ChildItem -Recurse "out\clickonce" | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  # example: release and pages jobs go here; do NOT run msbuild in them
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/setup.exe
          generate_release_notes: true

  pages-deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - name: Prepare site
        run: |
          rm -rf public
          mkdir -p public/published
          unzip -q artifacts/clickonce.zip -d public/published
          touch public/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4

name: Build & Publish ClickOnce to master/published

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']     # optional: create releases on tags if you keep a release job
  workflow_dispatch:

permissions:
  contents: write   # needed to commit to master

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build (Release)
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

  version_check:
    name: Detect version change in SkyCal.csproj
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.diff.outputs.version_changed }}
      before_version: ${{ steps.diff.outputs.before_version }}
      after_version:  ${{ steps.diff.outputs.after_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare version in SkyCal.csproj (HEAD vs HEAD^)
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          # 1) Find the csproj path case-insensitively, prefer one ending in SkyCal.csproj
          proj="$(git ls-files | awk 'tolower($0) ~ /skycal\.csproj$/ {print; exit}')"
          if [ -z "${proj:-}" ]; then
            proj="$(git ls-files | awk 'tolower($0) ~ /\.csproj$/ {print; exit}')"
          fi
          if [ -z "${proj:-}" ]; then
            echo "Could not locate a .csproj file in repo." >&2
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2) Function to extract a version from a commit:path, trying multiple tags
          get_ver () {
            local refpath="$1"
            # Try common tags in order of likelihood
            local tags='Version|ApplicationVersion|AssemblyVersion|FileVersion'
            git show "$refpath" 2>/dev/null \
              | tr -d '\r' \
              | sed -nE "s@.*<(${tags})>([^<]+)</(${tags})>.*@\\2@p" \
              | head -n1 \
              || true
          }

          # 3) Current and previous versions
          cur="$(get_ver "HEAD:${proj}")"
          prev="$(get_ver "HEAD^:${proj}")" || true

          # If HEAD^ doesn't exist (e.g. very first commit), prev stays empty
          changed=false
          if [ -n "$cur" ] && [ "$cur" != "$prev" ]; then
            changed=true
          fi

          echo "version_changed=$changed"   >> "$GITHUB_OUTPUT"
          echo "before_version=${prev:-}"   >> "$GITHUB_OUTPUT"
          echo "after_version=${cur:-}"     >> "$GITHUB_OUTPUT"
          echo "Detected project file: $proj"
          echo "Prev: '${prev:-<none>}'  Cur: '${cur:-<none>}'"
          
  release:
    name: ClickOnce Deploy
    needs: [build, version_check]
    if: ${{ needs.version_check.outputs.version_changed == 'true' }}
    runs-on: windows-latest
    steps:
      # Publish the project that has ClickOnce enabled
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2
      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"
      
      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\published\"
          /p:CreateWebPageOnPublish=true
          /p:WebPageFileName=Publish.htm
           
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

      # Publish to Master
      - name: Checkout master (target branch)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Publish GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version_check.outputs.after_version }}
          name: SkyCal v${{ needs.version_check.outputs.after_version }}
          draft: false
          prerelease: false
          files: |
            artifacts/setup.exe


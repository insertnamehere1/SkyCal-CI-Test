name: Build and Release (Windows .NET Framework)

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build Release
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

      - name: ClickOnce Publish
        run: msbuild "SkyCal.csproj" /t:Publish /p:Configuration=Release /p:PublishProfile="ClickOnceProfile.pubxml"

      - name: Stage artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "bin\Release\app.publish\setup.exe" -Destination "artifacts\setup.exe" -Force
          Compress-Archive -Path "bin\Release\app.publish\*" -DestinationPath "artifacts\clickonce.zip" -Force

      - name: Upload CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/setup.exe
          generate_release_notes: true

  pages-deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      # Publish using your profile
      - name: ClickOnce Publish
        run: msbuild "SkyCal.csproj" /t:Publish /p:Configuration=Release /p:PublishProfile="ClickOnceProfile.pubxml"

      # Stage: copy from the PublishDir set in the profile
      - name: Stage artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "bin\Release\net8.0-windows\app.publish\setup.exe" -Destination "artifacts\setup.exe" -Force
          Compress-Archive -Path "bin\Release\net8.0-windows\app.publish\*" -DestinationPath "artifacts\clickonce.zip" -Force

      # Pages: deploy to /published (must match InstallUrl/UpdateUrl)
      - name: Prepare Pages content
        run: |
          rm -rf public
          mkdir -p public/published
          unzip -q artifacts/clickonce.zip -d public/published
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          # name defaults to 'github-pages'; setting explicitly is fine too
          # name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build & Publish ClickOnce to master/published

on:
  push:
    branches: [ master ]
    tags: ['v*.*.*']     # optional: create releases on tags if you keep a release job
  workflow_dispatch:

permissions:
  contents: write   # needed to commit to master

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore "Bahtinov Collimator.sln"

      - name: Build (Release)
        run: msbuild "Bahtinov Collimator.sln" /t:Rebuild /p:Configuration=Release /m

  version_check:
    name: Detect version change in SkyCal.csproj
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.diff.outputs.version_changed }}
      before_version: ${{ steps.diff.outputs.before_version }}
      after_version:  ${{ steps.diff.outputs.after_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare version in SkyCal.csproj (HEAD vs HEAD^)
        id: diff
        shell: bash
        run: |
          set -e

          # Extract version from current commit
          cur=$(git show HEAD:SkyCal.csproj | tr -d '\r' \
            | sed -nE 's/.*<(Version|AssemblyVersion)>([^<]+)<\/(Version|AssemblyVersion)>.*/\2/p' | head -n1 || true)

          # Extract version from previous commit (may be empty if file new)
          prev=$(git show HEAD^:SkyCal.csproj 2>/dev/null | tr -d '\r' \
            | sed -nE 's/.*<(Version|AssemblyVersion)>([^<]+)<\/(Version|AssemblyVersion)>.*/\2/p' | head -n1 || true)

          changed=true
          if [ -n "$cur" ] && [ "$cur" != "$prev" ]; then
            changed=true
          fi

          echo "version_changed=$changed" >> $GITHUB_OUTPUT
          echo "before_version=$prev"     >> $GITHUB_OUTPUT
          echo "after_version=$cur"       >> $GITHUB_OUTPUT
          
  release:
    name: ClickOnce Deploy
    needs: [build, version_check]
    if: ${{ needs.version_check.outputs.version_changed == 'true' }}
    runs-on: windows-latest
    steps:
      # Publish the project that has ClickOnce enabled
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: ClickOnce Publish
        shell: pwsh
        run: >
          msbuild "SkyCal.csproj"
          /t:Publish
          /p:Configuration=Release
          /p:PublishProfile="Properties\PublishProfiles\ClickOnceProfile.pubxml"
          /p:PublishDir="$(Resolve-Path .)\out\clickonce\"
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path "out\clickonce\setup.exe") { Copy-Item "out\clickonce\setup.exe" artifacts\setup.exe -Force }
          Compress-Archive -Path "out\clickonce\*" -DestinationPath "artifacts\clickonce.zip" -Force
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts

      # Publish to Master
      - name: Checkout master (target branch)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Update published/ from clickonce.zip
        run: |
          set -e
          unzip -o artifacts/clickonce.zip -d published
          # Ensure Pages serves 'Application Files' folder correctly
          touch .nojekyll
      - name: Commit and push changes to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ClickOnce feed in /published [skip ci]" || echo "No changes to commit"
          git push origin master
